rules:
  - condition:
      expectation: expect_column_values_to_be_unique
      column: ARAccountId
    action:
      type: deduplicate_hash
      key_column: ARAccountId
      new_column: ARAccountId_New
      columns: ["ARAccountId", "source"]

  - condition:
      expectation: expect_column_values_to_not_be_null
      column: ARAccountId
    action:
      type: drop_nulls
